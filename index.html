<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry Dilla</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<!-- BACKGROUND BARU (LEBIH GELAP & PREMIUM) -->
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-cyan-800 text-white">

<!-- LOGIN -->
<div id="loginPage" class="h-screen relative overflow-hidden">

  <img id="slider" src="https://images.unsplash.com/photo-1604335399105-a0c585fd81a1"
       class="absolute w-full h-full object-cover">

  <div class="absolute w-full h-full bg-black/60"></div>

  <div id="sliderText"
       class="absolute bottom-10 w-full text-center text-white text-2xl font-bold">
    Diskon 30% 🔥
  </div>

  <div class="relative z-10 h-full flex justify-center items-center">
    <div class="bg-white/10 backdrop-blur-xl p-8 rounded-2xl text-white w-80 shadow-2xl border border-white/20">

      <h2 class="text-center text-2xl font-bold mb-4">Selamat Datang Di Laundry Dilla</h2>

      <input id="user" placeholder="Username"
             class="w-full p-2 mb-2 bg-white/20 rounded-lg">

      <input id="pass" type="password" placeholder="Password"
             class="w-full p-2 mb-3 bg-white/20 rounded-lg">

      <button onclick="login()"
              class="w-full bg-gradient-to-r from-blue-500 to-cyan-400 p-2 rounded-lg">
        Login
      </button>

    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden p-6">

<h1 class="text-3xl font-bold mb-6">Dashboard Laundry</h1>

<!-- HERO -->
<div class="relative mb-6 rounded-3xl overflow-hidden shadow-2xl">
  <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952"
       class="w-full h-56 object-cover">
  <div class="absolute inset-0 bg-black/60 flex flex-col justify-center px-6">
    <h2 class="text-3xl font-bold">Laundry Dashboard 🚀</h2>
    <p class="text-sm opacity-90">Kelola pesanan lebih cepat & modern</p>
  </div>
</div>

<!-- STAT -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

  <div class="bg-white text-black p-4 rounded-2xl shadow flex gap-3">
    <div class="text-3xl">📦</div>
    <div><p>Total</p><h3 id="total">0</h3></div>
  </div>

  <div class="bg-white text-black p-4 rounded-2xl shadow flex gap-3">
    <div class="text-3xl">⚙️</div>
    <div><p>Proses</p><h3 id="proses">0</h3></div>
  </div>

  <div class="bg-white text-black p-4 rounded-2xl shadow flex gap-3">
    <div class="text-3xl">✅</div>
    <div><p>Selesai</p><h3 id="selesai">0</h3></div>
  </div>

  <div class="bg-white text-black p-4 rounded-2xl shadow flex gap-3">
    <div class="text-3xl">💰</div>
    <div><p>Rp</p><h3 id="uang">0</h3></div>
  </div>

</div>

<button onclick="logout()" class="mb-4 bg-red-500 px-4 py-2 rounded-lg">Logout</button>

<!-- FORM -->
<form onsubmit="return tambah()" class="mb-6 grid gap-2 bg-white text-black p-4 rounded-2xl shadow">

<input id="nama" placeholder="Nama Customer" class="border p-2 rounded">
<input id="alamat" placeholder="Alamat" class="border p-2 rounded">
<input id="wa" placeholder="WhatsApp" class="border p-2 rounded">

<select id="layanan" onchange="previewHarga()" class="border p-2 rounded">
<option value="Cuci Kering">Cuci Kering</option>
<option value="Setrika">Setrika</option>
<option value="Express">Express</option>
</select>

<select id="pengambilan" onchange="previewHarga()" class="border p-2 rounded">
<option value="Ambil di Tempat">Ambil di Tempat</option>
<option value="Antar ke Rumah">Antar ke Rumah (+5000)</option>
</select>

<input id="berat" type="number" placeholder="Berat" class="border p-2 rounded" oninput="previewHarga()">

<div>Estimasi: Rp <span id="preview">0</span></div>

<button class="bg-blue-500 text-white p-2 rounded-lg">Tambah</button>

</form>

<!-- SEARCH -->
<input id="searchInput" oninput="render()" placeholder="🔍 Cari..."
       class="w-full p-3 mb-4 border rounded-xl text-black">

<!-- CARD -->
<div id="customerCard" class="grid md:grid-cols-3 gap-4 mb-6"></div>

<!-- TABLE -->
<table class="w-full bg-white text-black rounded-xl overflow-hidden">
<thead class="bg-gray-200">
<tr>
<th>ID</th><th>Nama</th><th>Alamat</th><th>WA</th>
<th>Layanan</th><th>Pengambilan</th><th>Berat</th>
<th>Harga</th><th>Status</th><th>Aksi</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

</div>

<script>
// LOGIN
function login(){
  if(user.value=="dila" && pass.value=="12345"){
    loginPage.classList.add('hidden');
    app.classList.remove('hidden');
  } else alert("Login gagal");
}
function logout(){
  loginPage.classList.remove('hidden');
  app.classList.add('hidden');
}

// SLIDER
let imgs=[
"https://images.unsplash.com/photo-1604335399105-a0c585fd81a1",
"https://images.unsplash.com/photo-1581578731548-c64695cc6952",
"https://images.unsplash.com/photo-1598514982871-0cda9f6fda8a"
];
let txt=["Diskon 30%","Gratis Antar","Express Cepat"];
let i=0;
setInterval(()=>{
  i=(i+1)%imgs.length;
  slider.src=imgs[i];
  sliderText.innerText=txt[i];
},3000);

// DATA
let data=JSON.parse(localStorage.getItem('laundry'))||[];
let id=data.length?data[data.length-1].id+1:1;

function harga(l,b){
  b=Number(b)||0;
  if(l=="Cuci Kering") return b*5000;
  if(l=="Setrika") return b*4000;
  if(l=="Express") return b*8000;
  return 0;
}

function previewHarga(){
  let h=harga(layanan.value,berat.value);
  if(pengambilan.value=="Antar ke Rumah") h+=5000;
  preview.innerText=h.toLocaleString();
}

function tambah(){
  if(!nama.value||!alamat.value||!wa.value||!berat.value){
    alert("Lengkapi data"); return false;
  }

  let h=harga(layanan.value,berat.value);
  if(pengambilan.value=="Antar ke Rumah") h+=5000;

  data.push({
    id:id++,
    nama:nama.value,
    alamat:alamat.value,
    wa:wa.value,
    layanan:layanan.value,
    pengambilan:pengambilan.value,
    berat:berat.value,
    harga:h,
    status:"Menunggu"
  });

  simpan(); render(); return false;
}

function nextStatus(i){
  if(data[i].status=="Menunggu") data[i].status="Diproses";
  else if(data[i].status=="Diproses") data[i].status="Selesai";
  simpan(); render();
}

function hapus(i){
  if(confirm("Hapus data?")){
    data.splice(i,1);
    simpan(); render();
  }
}

function simpan(){
  localStorage.setItem('laundry',JSON.stringify(data));
}

function warnaStatus(s){
  if(s=="Menunggu") return "bg-yellow-100";
  if(s=="Diproses") return "bg-blue-100";
  if(s=="Selesai") return "bg-green-100";
}

function render(){
  let keyword=searchInput.value.toLowerCase();
  let html="",card="",t=0,p=0,s=0,u=0;

  data.forEach((d,i)=>{

    if(!d.nama.toLowerCase().includes(keyword) &&
       !d.alamat.toLowerCase().includes(keyword) &&
       !d.wa.toLowerCase().includes(keyword)) return;

    t++;
    if(d.status=="Diproses") p++;
    if(d.status=="Selesai"){s++;u+=d.harga;}

    html+=`
<tr class="text-center">
<td>${d.id}</td>
<td>${d.nama}</td>
<td>${d.alamat}</td>
<td>${d.wa}</td>
<td>${d.layanan}</td>
<td>${d.pengambilan}</td>
<td>${d.berat}</td>
<td>Rp ${d.harga.toLocaleString()}</td>
<td>${d.status}</td>
<td class="flex justify-center gap-2">

<button onclick="nextStatus(${i})"
class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded-lg shadow">
✅
</button>

<button onclick="hapus(${i})"
class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg shadow">
🗑
</button>

</td>
</tr>`;

    card+=`
<div class="bg-white text-black p-4 rounded-xl shadow hover:scale-105 transition ${warnaStatus(d.status)}">
<h3 class="font-bold">${d.nama}</h3>
<p>📍 ${d.alamat}</p>
<p>📲 ${d.wa}</p>
<p>🧺 ${d.layanan}</p>
<p>🚚 ${d.pengambilan}</p>
<p>⚖️ ${d.berat} kg</p>
<p class="text-blue-600 font-bold">Rp ${d.harga}</p>

<div class="flex gap-2 mt-2">
<button onclick="nextStatus(${i})" class="flex-1 bg-green-500 text-white rounded">Next</button>
<button onclick="hapus(${i})" class="flex-1 bg-red-500 text-white rounded">Hapus</button>
</div>

</div>`;
  });

  tabel.innerHTML=html;
  customerCard.innerHTML=card;

  total.innerText=t;
  proses.innerText=p;
  selesai.innerText=s;
  uang.innerText=u.toLocaleString();
}

render();
</script>

</body>
</html>
