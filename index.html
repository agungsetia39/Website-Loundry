<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry Dilla</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-cyan-800 text-white">

<!-- LOGIN -->
<div id="loginPage" class="h-screen flex justify-center items-center">
  <div class="box">
    <h2 class="title">LaundryPro</h2>

    <input id="user" placeholder="Username" class="input">
    <input id="pass" type="password" placeholder="Password" class="input">

    <button onclick="login()" class="btn">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden p-6">

<h1 class="text-2xl mb-4">Dashboard Laundry</h1>

<button onclick="logout()" class="btn-logout">Logout</button>

<form onsubmit="return tambah()" class="form-box">
<input id="nama" placeholder="Nama Customer" class="input2">
<input id="alamat" placeholder="Alamat" class="input2">
<input id="wa" placeholder="WhatsApp" class="input2">
<input id="berat" type="number" placeholder="Berat" class="input2">

<button class="btn-submit">Tambah</button>
</form>

<table class="table">
<thead>
<tr>
<th>ID</th><th>Nama</th><th>Alamat</th><th>WA</th><th>Berat</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

</div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
